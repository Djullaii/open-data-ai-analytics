apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-data-web
  namespace: open-data
  labels:
    app: open-data-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-data-web
  template:
    metadata:
      labels:
        app: open-data-web
    spec:
      containers:
        - name: web
          image: open-data-ai-web:gitops
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: GITOPS_MESSAGE
              value: "GitOps release v1"
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
